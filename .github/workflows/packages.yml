name: Package all the things

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

jobs:
  build_varnish:
    name: Varnish ${{ matrix.target }} ${{ matrix.arch.name }}
    runs-on: ubuntu-24.04${{ matrix.arch.suffix }}
    strategy:
      fail-fast: false
      matrix:
        arch: &arches
          - name: "amd64"
            suffix: ""
          - name: "arm64"
            suffix: "-arm"
        target: &targets
          - debian-bookworm-deb
          - debian-trixie-deb
          - ubuntu-jammy-deb
          - ubuntu-noble-deb
          - ubuntu-questing-deb
          - ubuntu-resolute-deb
          - almalinux-9-rpm
          - almalinux-10-rpm
          - amazonlinux-2023-rpm
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Build Varnish packages
        run: |
          ulimit -n 2048
          PARAM_DIST=`echo ${{ matrix.target}} | cut -d- -f 1`
          PARAM_RELEASE=`echo ${{ matrix.target }} | cut -d- -f 2`
          EXT=`echo ${{ matrix.target }} | cut -d- -f 3`

          cp pkg.env varnish/

          docker run \
            --network host \
            --rm \
            --security-opt seccomp=unconfined \
            --workdir /workdir/varnish \
            -v$(pwd):/workdir \
            -e PDIR=/workdir/packages/ \
            $PARAM_DIST:$PARAM_RELEASE \
            /workdir/build_scripts/make-$EXT-packages.sh

          tree packages

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: varnish-${{ matrix.target }}-${{ matrix.arch.name }}
          path: packages

  collect_all_packages:
    name: Collect all packages
    needs: [build_varnish]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Reorganize packages (strip first subdirectory)
        run: |
          mkdir -p all-packages
          # For each artifact directory, copy its contents while preserving structure
          for artifact_dir in downloaded-artifacts/*/; do
            if [ -d "$artifact_dir" ]; then
              cp -r "$artifact_dir"* all-packages/ 2>/dev/null || true
            fi
          done

#      - name: Sign
#        run: |
#          for f in $(find packages -type f); do
#              fname=$(basename $f)
#              dname=$(dirname $f)
#              sum=$(sha256sum $f | awk '{print $1}')
#
#              mkdir -p signed/$dname
#              # we don't sign dsc files
#              if [ "${f##*.}" = "dsc" ]; then
#                  cp "$f" signed/$f
#                  continue
#              fi
#
#              curl \
#                  -v \
#                  --http1.1 \
#                  --show-error \
#                  --fail \
#                  --data-binary @$f \
#                  --header "content-sha256: $sum" \
#                  --header "filename: $fname" \
#                  --header "key: ${{ secrets.PKGSIGN_KEY }}" \
#                  -u "${{ secrets.PKGSIGN_USER }}:${{ secrets.PKGSIGN_PASS}}" \
#                  -o signed/$f "${{ secrets.PKGSIGN_URL }}"
#          done

      - name: Display collected packages
        run: |
          ls -lhR all-packages/
      
      - name: Upload all packages as single artifact
        uses: actions/upload-artifact@v4
        with:
          name: all-packages
          path: all-packages/

  test_all_packages:
    name: Load all packages
    needs: collect_all_packages
    runs-on: ubuntu-24.04${{ matrix.arch.suffix }}
    strategy:
      fail-fast: false
      matrix:
        arch: *arches
        target: *targets
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: all-packages

      - name: Run varnishtest
        run: |
          set -x

          ulimit -n 2048
          PARAM_DIST=`echo ${{ matrix.target}} | cut -d- -f 1`
          PARAM_RELEASE=`echo ${{ matrix.target }} | cut -d- -f 2`

          PKG_DIR=$(pwd)/$PARAM_DIST/$PARAM_RELEASE/${{ matrix.arch.name }}

          docker run \
            --network host \
            --rm \
            -w /workdir \
            -v $PKG_DIR:/workdir \
            -v $(pwd)/build_scripts:/workdir/build_scripts/ \
            $PARAM_DIST:$PARAM_RELEASE \
            //workdir/build_scripts/test-packages.sh
